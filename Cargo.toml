[package]
name = "pg_ffmpeg"
version = "0.1.3"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]

[[bin]]
name = "pgrx_embed_pg_ffmpeg"
path = "./src/bin/pgrx_embed.rs"

[features]
default = ["pg16"]
pg16 = ["pgrx/pg16", "pgrx-tests/pg16"]
pg17 = ["pgrx/pg17", "pgrx-tests/pg17"]
pg18 = ["pgrx/pg18", "pgrx-tests/pg18"]
pg_test = ["tempfile"]

[dependencies]
pgrx = "0.17"
ffmpeg-next = "7"
tempfile = { version = "3", optional = true }
serde_json = "1"

[dev-dependencies]
pgrx-tests = "0.17"
tempfile = "3"

[profile.dev]
panic = "unwind"
lto = "thin"

[profile.release]
panic = "unwind"
opt-level = 3
lto = "fat"

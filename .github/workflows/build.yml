name: Build Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:trixie
    strategy:
      fail-fast: false
      matrix:
        pg_version: [16, 17, 18]

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pgrx
        with:
          pg_version: ${{ matrix.pg_version }}

      - name: Build extension
        run: |
          . "$HOME/.cargo/env"
          cargo pgrx package \
            --pg-config "/usr/lib/postgresql/${{ matrix.pg_version }}/bin/pg_config" \
            --features "pg${{ matrix.pg_version }}" \
            --no-default-features

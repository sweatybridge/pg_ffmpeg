name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: [16, 17, 18]
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libclang-dev \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            libavfilter-dev libavdevice-dev \
            libreadline-dev

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache-key: pg${{ matrix.pg_version }}
          cache-directories: /home/runner/.pgrx

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --locked

      - name: Initialize pgrx
        run: |
          set +e
          v=$(cargo pgrx info version pg${{ matrix.pg_version }})
          if [ $? -ne 0 ]; then
            cargo pgrx init --pg${{ matrix.pg_version }} download
          fi

      - name: Clippy
        run: cargo clippy --features pg${{ matrix.pg_version }} --no-default-features -- -D warnings

      - name: Test
        run: cargo pgrx test "pg${{ matrix.pg_version }}"

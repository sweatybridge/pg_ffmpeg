name: Test

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: [16, 17, 18]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache-key: pg${{ matrix.pg_version }}
          cache-directories: /home/runner/.pgrx

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install dependencies
        run: |
          sudo add-apt-repository -y ppa:ubuntuhandbook1/ffmpeg7
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libclang-dev \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            libavfilter-dev libavdevice-dev \
            libreadline-dev

      - name: Install cargo-pgrx
        run: cargo install --locked --git https://github.com/pgcentralfoundation/pgrx.git cargo-pgrx

      - name: Initialize pgrx
        run: |
          set +e
          v=$(cargo pgrx info version pg${{ matrix.pg_version }})
          if [ $? -ne 0 ]; then
            cargo pgrx init --pg${{ matrix.pg_version }} download
          fi

      - name: Clippy
        run: cargo clippy --features pg${{ matrix.pg_version }} --no-default-features -- -D warnings

      - name: Test
        run: cargo pgrx test "pg${{ matrix.pg_version }}"

      - name: Bench
        run: cargo pgrx bench "pg${{ matrix.pg_version }}"

  # HW-encoder smoke tests (Task F5). Opt-in job that only runs when
  # a self-hosted runner with a GPU is available. It is never required
  # for a PR to merge — the default `test` matrix above covers every
  # code path via the software-fallback branch of `hwaccel::hw_encoder`.
  test-hwaccel:
    runs-on: [self-hosted, gpu]
    if: ${{ contains(github.event.pull_request.labels.*.name, 'hwaccel') || github.event_name == 'workflow_dispatch' }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache-key: pg16-hwaccel

      - name: Install dependencies
        run: |
          sudo add-apt-repository -y ppa:ubuntuhandbook1/ffmpeg7
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libclang-dev \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            libavfilter-dev libavdevice-dev \
            libreadline-dev

      - name: Install cargo-pgrx
        run: cargo install --locked --git https://github.com/pgcentralfoundation/pgrx.git cargo-pgrx

      - name: Initialize pgrx
        run: |
          set +e
          v=$(cargo pgrx info version pg16)
          if [ $? -ne 0 ]; then
            cargo pgrx init --pg16 download
          fi

      - name: HW acceleration tests
        run: cargo pgrx test pg16 --features hwaccel_tests
